<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Stock System</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

</head>
<body>

<h1>📦 ระบบสต๊อกสินค้า</h1>

<h3>รายการสินค้า</h3>

<ul id="list"></ul>

<script>

// ใส่ค่าของคุณตรงนี้
const supabaseUrl = "https://ypavlbkyvglfacikglbv.supabase.co";
const supabaseKey = "sb_publishable_GaGZblLBVe_f9MjkcTYreA_VMI_nDzy";

const supabaseClient = supabase.createClient(
  supabaseUrl,
  supabaseKey
);

// โหลดสินค้า
async function loadProducts() {

  const { data, error } = await supabaseClient
    .from('products')
    .select('*');

  if (error) {
    console.log(error);
    return;
  }

  let html = "";

  data.forEach(item => {
    html += `<li>${item.name} | จำนวน: ${item.qty}</li>`;
  });

  document.getElementById("list").innerHTML = html;
}

loadProducts();

</script>

</body>
</html>
